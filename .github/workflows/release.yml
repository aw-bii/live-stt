name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller huggingface_hub

      - name: Generate icon
        run: python scripts/make_ico.py

      - name: Build main exe
        run: pyinstaller bertytype.spec

      - name: Build setup exe
        run: pyinstaller bertytype-setup.spec

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bertytype.exe
            dist/bertytype-setup.exe
          generate_release_notes: true
