name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create virtual environment
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install -e .
          pip install pytest pytest-mock

      - name: Run tests
        run: |
          .venv\Scripts\activate
          pytest tests/ -v

      - name: Run linting
        run: |
          .venv\Scripts\activate
          python -m py_compile src/livesttt/**/*.py